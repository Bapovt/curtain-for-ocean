<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>Curtain for Ocean</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;500&display=swap" rel="stylesheet">

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  color: white;
  overflow-x: hidden;
  background-color: #0b1d2a;
}

header {
  position: fixed;
  top: 30px;
  left: 50px;
  font-size: 18px;
  letter-spacing: 3px;
  z-index: 100;
}

.section {
  height: 100vh;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding-left: 100px;
  text-align: left;

  font-size: 60px;
  font-weight: 300;
  letter-spacing: 5px;

  opacity: 0;
  transform: translateY(40px);
  transition: all 1.5s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.s1 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21') no-repeat center/cover;
}

.s2 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.openai.com/static-rsc-4/ODwA1_rejsNRF6xi8iOwlNOoFmGlT9fFsMLUoMmc1GE8QxmLAO5_FvlU1cGbMHXBpEWrmjGlQ_e4UiDLloKo2YhkvZMj9bnJiOWeWeMGZHJ4WPsWjpAvZKpSFcTgG_zy7Eor0IKp-eKIBJWKutJTNUvXNgQpMsxHBqND5XiLL5zg0TGiFvjj_sLnVs7fNmsr?purpose=fullsize') no-repeat center/cover;
}

.s3 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.openai.com/static-rsc-4/gf-RJdV-n4vE0jNBDWl_v7QkY4w6Iv-D8nBoC9466ZhuELeHgCnf53nqhdI5ojjXYqlqgUJs-9wV0hjypFdSLSOEV3OSWBKPGEwf3iPa3rw6vGJSEMy1wnUFJuBXPu4jrJl2aW5Vokqc_gdfO_undfug19bg4fjVpqAPUMcueT31cUZ63T4CB5ajAeb6qDni?purpose=fullsize') no-repeat center/cover;
}
</style>
</head>

<body>

<header>Curtain for Ocean</header>

<div class="section s1">
  Flow in Silence
</div>

<div class="section s2">
  Where Stillness Shines
</div>

<div class="section s3">
  Silence, Perfected
</div>

<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
}, {
  threshold: 0.3
});

sections.forEach(section => {
  observer.observe(section);
});
</script>

</body>
</html>
