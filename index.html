<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Curtain for Ocean</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;500&display=swap" rel="stylesheet">

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  color: white;
  overflow-x: hidden;
  background-color: #0b1d2a;
}

header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 25px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;

  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
}

.logo {
  font-size: 18px;
  letter-spacing: 3px;
}

nav a {
  margin-left: 30px;
  text-decoration: none;
  color: white;
  font-size: 14px;
  letter-spacing: 2px;
  transition: opacity 0.3s;
}

nav a:hover {
  opacity: 0.6;
}

.section {
  height: 100vh;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding-left: 100px;
  text-align: left;

  font-size: 55px;
  font-weight: 300;
  letter-spacing: 5px;

  opacity: 0;
  transform: translateY(40px);
  transition: all 1.5s ease;

  position: relative;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.s1 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.openai.com/static-rsc-4/ODwA1_rejsNRF6xi8iOwlNOoFmGlT9fFsMLUoMmc1GE8QxmLAO5_FvlU1cGbMHXBpEWrmjGlQ_e4UiDLloKo2YhkvZMj9bnJiOWeWeMGZHJ4WPsWjpAvZKpSFcTgG_zy7Eor0IKp-eKIBJWKutJTNUvXNgQpMsxHBqND5XiLL5zg0TGiFvjj_sLnVs7fNmsr?purpose=fullsize') no-repeat center/cover;
}

.s2 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21') no-repeat center/cover;
}

.s3 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.openai.com/static-rsc-4/Ua5OJiFr2Rw4ks7MieP_yYRIJV566cDb_m0j-PbQ7go6fCOJiTkTE6BeuheOMz1Z4YVGteR63kz3gXXxFzh7tqHt3nmxq5ygdmi69YOgG2ar4O2zYe5VemTyQPPC-u-RtU2YyHUb5OGl_gNNmK3ayAwp3Q1IQf_ZhtAkx_tu_hzQj2Vm-0CP5lElSSuM8OwR?purpose=fullsize') no-repeat center/cover;
}
</style>
</head>

<body>

<div class="section s1" id="s1">
  <div>Flow in Silence</div>
  <a href="#s2" class="next">↓</a>
</div>

<div class="section s2" id="s2">
  <div>Where Stillness Shines</div>
  <a href="#s3" class="next">↓</a>
</div>

<div class="section s3" id="s3">
  <div>Silence, Perfected</div>
</div>

<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
}, {
  threshold: 0.3
});

sections.forEach(section => {
  observer.observe(section);
});
</script>

</body>
</html>
