<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Curtain for Ocean</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;500&display=swap" rel="stylesheet">

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  color: white;
  overflow-x: hidden;
  background-color: #0b1d2a;
}

header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 25px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;

  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
}

.logo {
  font-size: 18px;
  letter-spacing: 3px;
}

nav a {
  margin-left: 30px;
  text-decoration: none;
  color: white;
  font-size: 14px;
  letter-spacing: 2px;
  transition: opacity 0.3s;
}

nav a:hover {
  opacity: 0.6;
}

.section {
  height: 100vh;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding-left: 100px;
  text-align: left;

  font-size: 55px;
  font-weight: 300;
  letter-spacing: 5px;

  opacity: 0;
  transform: translateY(40px);
  transition: all 1.5s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.s1 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
}

.s2 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21') no-repeat center/cover;
}

.s3 {
  background:
    linear-gradient(rgba(11,29,42,0.5), rgba(11,29,42,0.7)),
    url('https://images.unsplash.com/photo-1500534314209-a25ddb2bd429') no-repeat center/cover;
}
</style>
</head>

<body>

<header>
  <div class="logo">Curtain for Ocean</div>
  <nav>
    <a href="#s1">Home</a>
    <a href="#s2">About</a>
    <a href="#s3">Collection</a>
  </nav>
</header>

<div class="section s1" id="s1">
  Flow in Silence
</div>

<div class="section s2" id="s2">
  Where Stillness Shines
</div>

<div class="section s3" id="s3">
  Silence, Perfected
</div>

<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
}, {
  threshold: 0.3
});

sections.forEach(section => {
  observer.observe(section);
});
</script>

</body>
</html>
